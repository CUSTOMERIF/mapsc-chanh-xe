<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>THÔNG TIN KHÁCH SIM AI</title>

  <meta name="theme-color" content="#0d1d3a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SIM AI" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    :root{
      --bg1:#071120;
      --bg2:#0d1d3a;
      --bg3:#132a52;
      --blue:#6ca8c8;
      --blue2:#8cc2de;
      --orange:#e98a2c;
      --orange2:#f6a544;
      --orange3:#ffd59c;
      --text:#eef5ff;
      --muted:rgba(238,245,255,.78);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg2);
    }

    #appFrame{
      width:100%;
      height:100vh;
      border:none;
      display:block;
      opacity:.02;
      transform:scale(1.01);
      transition:opacity .55s ease, transform .55s ease;
      background:var(--bg2);
    }

    body.app-ready #appFrame{
      opacity:1;
      transform:scale(1);
    }
/* ================= INTRO LOGO ================= */
.intro-logo{
  position:fixed;
  inset:0;
  z-index:10000;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.02) 0%, rgba(255,255,255,0) 45%),
    linear-gradient(180deg, #071120 0%, #0d1d3a 60%, #10264a 100%);
  transition:opacity .55s ease, visibility .55s ease;
}

.intro-logo.hide{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

.intro-card{
  position:relative;
  width:min(78vw, 290px);
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px;
  border-radius:28px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.98), rgba(246,248,252,.96));
  box-shadow:
    0 18px 45px rgba(0,0,0,.34),
    0 0 0 1px rgba(255,255,255,.45) inset,
    0 0 35px rgba(233,138,44,.10);
  animation:introPop 1s cubic-bezier(.2,.8,.2,1) both;
}

.intro-card::before{
  content:"";
  position:absolute;
  inset:-14px;
  border-radius:34px;
  background:
    radial-gradient(circle, rgba(233,138,44,.18) 0%, rgba(233,138,44,.08) 35%, rgba(233,138,44,0) 70%);
  filter:blur(14px);
  z-index:-1;
  animation:introGlow 2s ease-in-out infinite;
}

.intro-logo-img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  border-radius:18px;
  animation:introFloat 2.2s ease-in-out infinite;
}

@keyframes introPop{
  0%{
    transform:scale(.84);
    opacity:0;
  }
  55%{
    transform:scale(1.04);
    opacity:1;
  }
  100%{
    transform:scale(1);
    opacity:1;
  }
}

@keyframes introFloat{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-4px);
  }
}

@keyframes introGlow{
  0%,100%{
    transform:scale(.96);
    opacity:.7;
  }
  50%{
    transform:scale(1.06);
    opacity:1;
  }
}

@media (max-width:480px){
  .intro-card{
    width:min(76vw, 250px);
    border-radius:24px;
    padding:12px;
  }

  .intro-logo-img{
    border-radius:16px;
  }
                    }
    /* ================= LOADING ================= */
    .loading{
      position:fixed;
      inset:0;
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 82%, rgba(233,138,44,.24) 0%, rgba(233,138,44,.08) 18%, rgba(233,138,44,0) 42%),
        radial-gradient(circle at 20% 18%, rgba(108,168,200,.16) 0%, rgba(108,168,200,0) 28%),
        radial-gradient(circle at 80% 20%, rgba(108,168,200,.12) 0%, rgba(108,168,200,0) 26%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
      transition:opacity .65s ease, visibility .65s ease;
    }

    .loading.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .bg-grid{
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size:28px 28px;
      opacity:.28;
      mask-image:linear-gradient(180deg, rgba(0,0,0,.28), rgba(0,0,0,0));
    }

    .floor-glow{
      position:absolute;
      left:50%;
      bottom:-50px;
      transform:translateX(-50%);
      width:min(90vw,760px);
      height:250px;
      background:
        radial-gradient(ellipse at center,
          rgba(233,138,44,.34) 0%,
          rgba(233,138,44,.14) 34%,
          rgba(233,138,44,0) 72%);
      filter:blur(16px);
      animation:floorPulse 3.2s ease-in-out infinite;
    }

    .loading-card{
      position:relative;
      z-index:3;
      width:min(92vw,420px);
      padding:20px 18px 28px;
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#eef5ff;
      font-size:12px;
      letter-spacing:.3px;
      margin-bottom:14px;
      backdrop-filter:blur(6px);
      animation:fadeUp .8s ease both;
    }

    .badge .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--orange);
      box-shadow:0 0 12px rgba(233,138,44,.55);
      animation:pulseDot 1.4s ease-in-out infinite;
    }

    .logo-stage{
      position:relative;
      width:230px;
      height:230px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:14px;
      animation:fadeUp .95s ease both;
    }

    /* hào quang mặt trời mọc */
    .sun-flare{
      position:absolute;
      width:250px;
      height:250px;
      border-radius:50%;
      background:
        radial-gradient(circle,
          rgba(255,255,255,.95) 0%,
          rgba(255,213,156,.42) 14%,
          rgba(246,165,68,.20) 28%,
          rgba(233,138,44,.08) 44%,
          rgba(233,138,44,0) 64%);
      opacity:0;
      transform:scale(.75);
      animation:flarePulse 3s ease-in-out infinite;
    }

    .sun-ring{
      position:absolute;
      width:178px;
      height:178px;
      border-radius:50%;
      border:2px solid rgba(246,165,68,.22);
      bottom:18px;
      animation:ringPulse 3s ease-in-out infinite;
    }

    .sun-ring2{
      position:absolute;
      width:208px;
      height:208px;
      border-radius:50%;
      border:1px solid rgba(246,165,68,.10);
      bottom:3px;
      animation:ringPulse2 3s ease-in-out infinite;
    }

    .sun-core{
      position:absolute;
      width:122px;
      height:122px;
      border-radius:50%;
      bottom:38px;
      background:
        radial-gradient(circle,
          rgba(255,213,156,1) 0%,
          rgba(246,165,68,.92) 28%,
          rgba(233,138,44,.56) 58%,
          rgba(233,138,44,.12) 78%,
          rgba(233,138,44,0) 90%);
      animation:sunRise 3s ease-in-out infinite;
    }

    .sun-rays{
      position:absolute;
      width:278px;
      height:278px;
      border-radius:50%;
      background:
        conic-gradient(
          from 0deg,
          rgba(255,255,255,0) 0deg 12deg,
          rgba(246,165,68,.10) 20deg 28deg,
          rgba(255,255,255,0) 36deg 56deg,
          rgba(108,168,200,.08) 66deg 74deg,
          rgba(255,255,255,0) 82deg 104deg,
          rgba(246,165,68,.08) 112deg 120deg,
          rgba(255,255,255,0) 128deg 150deg,
          rgba(108,168,200,.07) 158deg 166deg,
          rgba(255,255,255,0) 174deg 360deg
        );
      filter:blur(8px);
      opacity:.8;
      animation:raysRotate 14s linear infinite;
    }

    .horizon{
      position:absolute;
      bottom:28px;
      width:250px;
      height:68px;
      border-radius:50%;
      background:
        radial-gradient(ellipse at center,
          rgba(7,17,32,0) 0%,
          rgba(7,17,32,.18) 42%,
          rgba(7,17,32,.72) 76%,
          rgba(7,17,32,.98) 100%);
      z-index:3;
    }

    .horizon-line{
      position:absolute;
      bottom:50px;
      width:200px;
      height:2px;
      background:linear-gradient(
        90deg,
        rgba(255,255,255,0),
        rgba(246,165,68,.55),
        rgba(255,255,255,0)
      );
      z-index:3;
    }

    .logo-box{
      position:relative;
      z-index:4;
      width:140px;
      height:140px;
      border-radius:32px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.03));
      box-shadow:
        0 18px 40px rgba(0,0,0,.35),
        0 0 0 1px rgba(255,255,255,.06) inset,
        0 0 26px rgba(233,138,44,.10);
      backdrop-filter:blur(4px);
      animation:logoFloat 3s ease-in-out infinite;
    }

    .logo-box::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.02) 48%, rgba(255,255,255,.06));
      z-index:1;
      pointer-events:none;
    }

    .logo-box::after{
      content:"";
      position:absolute;
      top:-20%;
      left:-120%;
      width:55%;
      height:140%;
      transform:rotate(20deg);
      background:linear-gradient(90deg,
        rgba(255,255,255,0),
        rgba(255,255,255,.62),
        rgba(255,255,255,0)
      );
      filter:blur(2px);
      opacity:0;
      z-index:2;
      animation:logoShine 3.5s ease-in-out infinite;
    }

    .logo-box img{
      position:relative;
      z-index:0;
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      padding:8px;
    }

    .title{
      margin:0;
      font-size:30px;
      font-weight:900;
      line-height:1.12;
      letter-spacing:.4px;
      color:var(--orange2);
      text-shadow:0 0 20px rgba(233,138,44,.12);
      animation:fadeUp 1s ease both;
      text-transform:uppercase;
    }

    .sub{
      margin-top:10px;
      max-width:320px;
      color:var(--text);
      opacity:.95;
      line-height:1.6;
      font-size:14px;
      animation:fadeUp 1.08s ease both;
    }

    .progress-wrap{
      width:min(84vw,260px);
      margin-top:18px;
      animation:fadeUp 1.16s ease both;
    }

    .progress-track{
      position:relative;
      width:100%;
      height:8px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .progress-bar{
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:14%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--orange), var(--orange2), var(--orange3));
      box-shadow:0 0 18px rgba(233,138,44,.34);
      transition:width .25s ease;
    }

    .progress-shine{
      position:absolute;
      top:-10px;
      bottom:-10px;
      width:72px;
      background:linear-gradient(90deg,
        rgba(255,255,255,0),
        rgba(255,255,255,.55),
        rgba(255,255,255,0)
      );
      filter:blur(6px);
      animation:progressShine 1.8s ease-in-out infinite;
    }

    .caption{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
    }

    .dots{
      margin-top:16px;
      display:flex;
      gap:8px;
      justify-content:center;
      animation:fadeUp 1.22s ease both;
    }

    .dots span{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--orange);
      box-shadow:0 0 12px rgba(233,138,44,.45);
      animation:dotBlink 1.2s infinite ease-in-out;
    }
    .dots span:nth-child(2){ animation-delay:.15s; }
    .dots span:nth-child(3){ animation-delay:.3s; }

    /* ===== animation ===== */
    @keyframes fadeUp{
      from{ opacity:0; transform:translateY(10px); }
      to{ opacity:1; transform:translateY(0); }
    }

    @keyframes floorPulse{
      0%,100%{ transform:translateX(-50%) scale(.96); opacity:.72; }
      50%{ transform:translateX(-50%) scale(1.05); opacity:1; }
    }

    @keyframes pulseDot{
      0%,100%{ transform:scale(.9); opacity:.75; }
      50%{ transform:scale(1.15); opacity:1; }
    }

    @keyframes logoFloat{
      0%{ transform:translateY(18px) scale(.92); opacity:.82; }
      42%{ transform:translateY(-12px) scale(1.06); opacity:1; }
      68%{ transform:translateY(-3px) scale(1.02); opacity:1; }
      100%{ transform:translateY(18px) scale(.92); opacity:.82; }
    }

    @keyframes sunRise{
      0%{ transform:translateY(18px) scale(.7); opacity:.28; }
      42%{ transform:translateY(-2px) scale(1.18); opacity:.98; }
      68%{ transform:translateY(0) scale(1.03); opacity:.74; }
      100%{ transform:translateY(18px) scale(.7); opacity:.28; }
    }

    @keyframes ringPulse{
      0%{ transform:scale(.84); opacity:.08; }
      42%{ transform:scale(1.10); opacity:.42; }
      68%{ transform:scale(1); opacity:.22; }
      100%{ transform:scale(.84); opacity:.08; }
    }

    @keyframes ringPulse2{
      0%{ transform:scale(.88); opacity:.04; }
      42%{ transform:scale(1.12); opacity:.18; }
      68%{ transform:scale(1.02); opacity:.10; }
      100%{ transform:scale(.88); opacity:.04; }
    }

    @keyframes flarePulse{
      0%,30%,100%{ opacity:0; transform:scale(.72); }
      42%{ opacity:.12; transform:scale(.92); }
      50%{ opacity:1; transform:scale(1.18); }
      58%{ opacity:.24; transform:scale(1.06); }
      68%{ opacity:0; transform:scale(.98); }
    }

    @keyframes raysRotate{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }

    @keyframes logoShine{
      0%,55%,100%{ left:-120%; opacity:0; }
      62%{ opacity:.9; }
      72%{ left:130%; opacity:0; }
    }

    @keyframes progressShine{
      0%{ left:-90px; opacity:0; }
      20%{ opacity:.8; }
      100%{ left:calc(100% + 20px); opacity:0; }
    }

    @keyframes dotBlink{
      0%,80%,100%{ transform:translateY(0) scale(.85); opacity:.45; }
      40%{ transform:translateY(-4px) scale(1.1); opacity:1; }
    }

    @media (max-width:480px){
      .loading-card{
        width:min(94vw,360px);
        padding:16px 14px 24px;
      }

      .logo-stage{
        width:190px;
        height:190px;
      }

      .logo-box{
        width:118px;
        height:118px;
        border-radius:28px;
      }

      .sun-core{
        width:100px;
        height:100px;
        bottom:30px;
      }

      .sun-ring{
        width:150px;
        height:150px;
      }

      .sun-ring2{
        width:176px;
        height:176px;
      }

      .sun-flare{
        width:210px;
        height:210px;
      }

      .sun-rays{
        width:220px;
        height:220px;
      }

      .horizon{
        width:210px;
        height:58px;
      }

      .horizon-line{
        width:165px;
        bottom:45px;
      }

      .title{
        font-size:24px;
      }

      .sub{
        font-size:13px;
        max-width:260px;
      }
    }
  </style>
</head>
<body>

  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbwGYNnRaX2YG6xYyzOT6WuOctsAjH1VLQFBPohLX2PbEts3smltw7vFob0RPnzJtYek/exec"
    allow="clipboard-read; clipboard-write"
    loading="eager"
  ></iframe>

  <!-- INTRO LOGO -->
<div class="intro-logo" id="introLogo">
  <div class="intro-card">
    <img src="logo-loading.png" alt="SIM AI Logo" class="intro-logo-img">
  </div>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="bg-grid"></div>
  <div class="floor-glow"></div>

  <div class="loading-card">
    <div class="badge">
      <span class="dot"></span>
      <span>SIM AI • Đang khởi động hệ thống</span>
    </div>

    <div class="logo-stage">
      <div class="sun-flare"></div>
      <div class="sun-rays"></div>
      <div class="sun-ring2"></div>
      <div class="sun-ring"></div>
      <div class="sun-core"></div>

      <div class="logo-box">
        <img src="logo-loading.png" alt="SIM AI Logo">
      </div>

      <div class="horizon-line"></div>
      <div class="horizon"></div>
    </div>

    <h1 class="title">THÔNG TIN KHÁCH SIM AI</h1>
    <div class="sub">
      Đang mở ứng dụng và tải giao diện tối ưu cho thiết bị của bạn...
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-shine"></div>
      </div>
      <div class="caption" id="loadingCaption">Vui lòng chờ trong giây lát</div>
    </div>

    <div class="dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</div>

  <script>
  const frame = document.getElementById("appFrame");
  const introLogo = document.getElementById("introLogo");
  const loading = document.getElementById("loading");
  const progressBar = document.getElementById("progressBar");
  const loadingCaption = document.getElementById("loadingCaption");

  let hasHidden = false;
  let fakeProgress = 12;
  let progressTimer;
  let loadingStarted = false;

  const loadingTexts = [
    "Vui lòng chờ trong giây lát",
    "Đang kết nối dữ liệu khách hàng...",
    "Đang chuẩn bị giao diện SIM AI...",
    "Sắp hoàn tất..."
  ];

  function updateProgressText(value) {
    if (value < 30) {
      loadingCaption.textContent = loadingTexts[0];
    } else if (value < 55) {
      loadingCaption.textContent = loadingTexts[1];
    } else if (value < 80) {
      loadingCaption.textContent = loadingTexts[2];
    } else {
      loadingCaption.textContent = loadingTexts[3];
    }
  }

  function startFakeProgress() {
    if (loadingStarted) return;
    loadingStarted = true;

    progressBar.style.width = fakeProgress + "%";
    updateProgressText(fakeProgress);

    progressTimer = setInterval(() => {
      if (hasHidden) return;

      if (fakeProgress < 35) {
        fakeProgress += Math.random() * 6;
      } else if (fakeProgress < 60) {
        fakeProgress += Math.random() * 4;
      } else if (fakeProgress < 82) {
        fakeProgress += Math.random() * 2.4;
      } else if (fakeProgress < 92) {
        fakeProgress += Math.random() * 1.1;
      }

      if (fakeProgress > 92) fakeProgress = 92;

      progressBar.style.width = fakeProgress + "%";
      updateProgressText(fakeProgress);
    }, 220);
  }

  function hideLoading() {
    if (hasHidden) return;
    hasHidden = true;

    clearInterval(progressTimer);
    progressBar.style.width = "100%";
    loadingCaption.textContent = "Hoàn tất";

    document.body.classList.add("app-ready");

    setTimeout(() => {
      loading.classList.add("hide");
    }, 260);
  }

  function startMainLoading() {
    introLogo.classList.add("hide");

    setTimeout(() => {
      loading.style.display = "flex";
      startFakeProgress();
    }, 250);
  }

  // 1) Vừa mở app: chỉ hiện logo trước
  loading.style.display = "none";

  // 2) Sau 1.2s mới chuyển sang màn loading
  setTimeout(() => {
    startMainLoading();
  }, 1200);

  // 3) Khi iframe tải xong thì ẩn loading
  frame.addEventListener("load", () => {
    setTimeout(hideLoading, 1450);
  });

  // 4) Chống treo nếu mạng chậm
  setTimeout(() => {
    if (!loadingStarted) startMainLoading();
  }, 1800);

  setTimeout(() => {
    hideLoading();
  }, 8500);
  </script>
